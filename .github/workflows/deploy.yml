name: Build & deploy site

on:
  push:
    branches: [main]
  # Daily run so scheduled (future-dated) posts publish themselves when their date arrives.
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx @11ty/eleventy
      # Renders the homepage's print stylesheet into the downloadable CV
      # (uses the Chrome preinstalled on ubuntu-latest runners).
      - run: bash scripts/build-cv-pdf.sh _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
